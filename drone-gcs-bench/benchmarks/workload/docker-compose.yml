name: drone-gcs-benchmark

services:
  workload-recorder:
    build:
      context: .
      dockerfile: Dockerfile.recorder
    image: drone-gcs/workload-recorder:latest
    container_name: workload-recorder
    ports:
      - "14550:14550/udp"
    volumes:
      - workload-shared-data:/data
    environment:
      - PYTHONUNBUFFERED=1
    command: ["--listen-host", "0.0.0.0", "--listen-port", "14550", "--output", "/data/recording.jsonl"]
    networks:
      - benchmark-net

  workload-generator:
    build:
      context: .
      dockerfile: Dockerfile.generator
    image: drone-gcs/workload-generator:latest
    container_name: workload-generator
    environment:
      - PYTHONUNBUFFERED=1
    command: ["--drones", "10", "--duration", "30", "--rate", "10", "--scenario", "circular_orbit", "--target-host", "workload-recorder"]
    networks:
      - benchmark-net
    depends_on:
      - workload-recorder

  workload-replay:
    build:
      context: .
      dockerfile: Dockerfile.replay
    image: drone-gcs/workload-replay:latest
    container_name: workload-replay
    volumes:
      - workload-shared-data:/data
    environment:
      - PYTHONUNBUFFERED=1
    command: ["--input", "/data/recording.jsonl", "--base-url", "http://fastapi-reference:8000", "--speed", "1.0"]
    networks:
      - benchmark-net

networks:
  benchmark-net:
    external: true
    name: benchmark-net

volumes:
  workload-shared-data:
