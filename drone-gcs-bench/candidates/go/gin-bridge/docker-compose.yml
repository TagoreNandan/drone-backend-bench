name: drone-gcs-benchmark

x-benchmark-service: &benchmark-service
  restart: unless-stopped
  networks:
    - benchmark-net

services:
  gin-reference:
    <<: *benchmark-service
    build:
      context: .
      dockerfile: Dockerfile
    image: drone-gcs/gin-reference:latest
    container_name: gin-reference
    environment:
      HOST: ${GIN_HOST:-0.0.0.0}
      PORT: ${GIN_PORT:-8000}
    ports:
      - "${GIN_PORT:-8000}:8000"
    healthcheck:
      test:
        - CMD-SHELL
        - wget --no-verbose --tries=1 --spider http://127.0.0.1:8000/api/v1/health || exit 1
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  prometheus:
    <<: *benchmark-service
    image: prom/prometheus:v2.54.1
    container_name: benchmark-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=7d
      - --web.enable-lifecycle
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    depends_on:
      gin-reference:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - wget
        - --spider
        - -q
        - http://127.0.0.1:9090/-/healthy
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

networks:
  benchmark-net:
    name: benchmark-net

volumes:
  prometheus-data:
