name: drone-gcs-benchmark

x-benchmark-service: &benchmark-service
  restart: unless-stopped
  networks:
    - benchmark-net

services:
  fastapi-reference:
    <<: *benchmark-service
    build:
      context: .
      dockerfile: Dockerfile
    image: drone-gcs/fastapi-reference:latest
    container_name: fastapi-reference
    environment:
      HOST: ${FASTAPI_HOST:-0.0.0.0}
      PORT: ${FASTAPI_PORT:-8000}
      UVICORN_WORKERS: ${FASTAPI_WORKERS:-1}
      UVICORN_LOG_LEVEL: ${FASTAPI_LOG_LEVEL:-info}
    ports:
      - "${FASTAPI_PORT:-8000}:8000"
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "import urllib.request,sys;sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health', timeout=3).status==200 else 1)"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  prometheus:
    <<: *benchmark-service
    image: prom/prometheus:v2.54.1
    container_name: benchmark-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=7d
      - --web.enable-lifecycle
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    depends_on:
      fastapi-reference:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - wget
        - --spider
        - -q
        - http://127.0.0.1:9090/-/healthy
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

networks:
  benchmark-net:
    name: benchmark-net

volumes:
  prometheus-data:
